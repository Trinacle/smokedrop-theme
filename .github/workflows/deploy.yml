name: Deploy theme to Bluehost

# Push to main -> theme is live on thesmokedrop.com automatically.
# Also runnable on demand from the Actions tab (workflow_dispatch).

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-bluehost
  cancel-in-progress: true

jobs:
  deploy:
    # Set repo variable DEPLOY_ENABLED=true (Settings -> Secrets and variables ->
    # Actions -> Variables) once the SSH secrets below are added. Until then this
    # job is skipped so pushes don't produce failing runs.
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          # Only ever offer THIS key (fixes "Too many authentication failures"),
          # and auto-accept the host key on first contact.
          cat > ~/.ssh/config <<EOF
          Host deploy
            HostName ${{ secrets.SSH_HOST }}
            User ${{ secrets.SSH_USER }}
            Port ${{ secrets.SSH_PORT }}
            IdentityFile ~/.ssh/id_deploy
            IdentitiesOnly yes
            PreferredAuthentications publickey
            StrictHostKeyChecking accept-new
            UserKnownHostsFile ~/.ssh/known_hosts
          EOF
          chmod 600 ~/.ssh/config

      - name: Test SSH connection
        run: |
          ssh deploy 'echo "connected as $(whoami) on $(hostname)"; ls -la "${{ secrets.DEPLOY_PATH }}" 2>/dev/null || echo "DEPLOY_PATH not found yet (rsync will create it)"'

      - name: Rsync theme to server
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.cpanel.yml' \
            --exclude='README.md' \
            --exclude='.htaccess' \
            -e "ssh" \
            ./ "deploy:${{ secrets.DEPLOY_PATH }}/"

      - name: Fix file permissions + purge cache
        continue-on-error: true
        run: |
          ssh deploy "chmod -R 755 ${{ secrets.DEPLOY_PATH }} && find ${{ secrets.DEPLOY_PATH }} -type f -exec chmod 644 {} \; && touch ${{ secrets.DEPLOY_PATH }}/../../cache/.litespeed_purgeall 2>/dev/null; echo done"
